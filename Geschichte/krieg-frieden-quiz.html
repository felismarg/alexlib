{topic:"Korea & Vietnam", q:"Warum gilt die Tet-Offensive (Jan. 1968) als psychologischer Wendepunkt, obwohl sie militärisch eine Niederlage für die NLF war?",
 options:["Sie zeigte den USA, dass der Krieg militärisch nicht gewinnbar erschien — die US-Öffentlichkeit wandte sich ab.","Sie führte zur sofortigen Kapitulation Nordvietnams.","Sie beendete die Bombardierungen.","Sie war der erste Einsatz von Chemiewaffen."],

{topic:"Korea & Vietnam", q:"Was bedeutet 'Vietnamisierung' (Nixon-Doktrin)?",
 options:["Vollständiger sofortiger US-Abzug ohne Bedingungen.","Abzug der US-Bodentruppen bei gleichzeitiger Stärkung südvietnamesischer Streitkräfte.","Direkte Eingliederung Vietnams in die USA.","Ein Bündnis zwischen Nord- und Südvietnam."],

{topic:"Korea & Vietnam", q:"Warum war die Domino-Theorie laut Lernzettel eine Fehlwahrnehmung?",
 options:["Weil sie zu spät entwickelt wurde.","Weil lokale Unabhängigkeitskämpfe primär nationale, keine globale kommunistische Agenda hatten.","Weil sie nie politisch einflussreich war.","Weil sie nur auf Europa angewendet wurde."],
 correct:1, explain:"Die Annahme, dass der Fall eines Staates automatisch Nachbarstaaten 'umkippen' lässt, ignorierte, dass lokale Unabhängigkeitsbewegungen primär national motiviert waren — sie führte direkt ins Vietnam-Desaster."},
{topic:"Korea & Vietnam", q:"Was beschreibt der Begriff 'Body Count' im Vietnamkrieg?",
 options:["Die Anzahl evakuierter Zivilisten","Statistisches Maß für militärischen Erfolg durch Anzahl getöteter Gegner — erwies sich als kontraproduktiv.","Die Truppenstärke der USA","Eine medizinische Versorgungsstatistik"],

{topic:"Nahost", q:"Was machte die Suez-Krise 1956 historisch so bedeutsam?",

{topic:"Nahost", q:"Was löste den Sechstagekrieg 1967 aus, und was war das Ergebnis?",

{topic:"Nahost", q:"Was war das Ergebnis des Jom-Kippur-Kriegs 1973?",

{topic:"Nahost", q:"Wer vermittelte den Friedensvertrag Israel–Ägypten 1979 und was war eine Folge?",

{topic:"Nahost", q:"Was besagt UN-Resolution 242?",

{topic:"Stellvertreterkriege", q:"Wie lange dauerte der sowjetische Krieg in Afghanistan (1979–1989) und wie wird er manchmal bezeichnet?",

{topic:"Stellvertreterkriege", q:"Welche Perspektive auf den Afghanistan-Einmarsch betont der Lernzettel als prüfungsrelevant?",

 correct:1, explain:"Unipolares US-Moment mit einem Machtvakuum, das alte Nationalismuskonflikte freisetzte. Neue Konflikttypen: ethnische Bürgerkriege statt Großmachtkonfrontation."}

let topics = ["Alle Themen", ...new Set(QUESTIONS.map(q=>q.topic))];
let currentSet = [];
let currentIndex = 0;
let correctCount = 0;
let answeredCount = 0;
let wrongTopics = {};
let locked = false;

const topicSelect = document.getElementById('topicSelect');
topics.forEach(t=>{
  const opt = document.createElement('option');
  opt.value = t; opt.textContent = t;
  topicSelect.appendChild(opt);
});

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function buildSet(){
  const t = topicSelect.value;
  let pool = t === "Alle Themen" ? QUESTIONS.slice() : QUESTIONS.filter(q=>q.topic===t);
  currentSet = shuffle(pool.slice());
  currentIndex = 0; correctCount = 0; answeredCount = 0; wrongTopics = {};
  renderStats();
  renderQuestion();
}

function renderStats(){
  document.getElementById('statTotal').textContent = answeredCount + "/" + currentSet.length;
  document.getElementById('statCorrect').textContent = correctCount;
  const pct = answeredCount ? Math.round(correctCount/answeredCount*100) : 0;
  document.getElementById('statPercent').textContent = pct + "%";
}

function renderQuestion(){
  locked = false;
  const area = document.getElementById('quizArea');
  if(currentIndex >= currentSet.length){
    renderDone();
    return;
  }
  const item = currentSet[currentIndex];
  const letters = ['A','B','C','D'];
  area.innerHTML = `
    <div class="card">
      <div class="progress-track"><div class="progress-fill" style="width:${(currentIndex/currentSet.length*100)}%"></div></div>
      <div class="topic-tag">${item.topic}</div>
      <div class="question">${item.q}</div>
      <div class="options" id="optionsBox">
        ${item.options.map((o,i)=>`
          <div class="option" data-idx="${i}">
            <div class="letter">${letters[i]}</div>
            <div>${o}</div>
          </div>`).join('')}
      </div>
      <div class="explain" id="explainBox"></div>
      <button class="nextbtn" id="nextBtn">Weiter →</button>
    </div>
  `;
  document.querySelectorAll('.option').forEach(el=>{
    el.addEventListener('click', ()=>handleAnswer(el, item));
  });
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    currentIndex++;
    renderQuestion();
  });
}

function handleAnswer(el, item){
  if(locked) return;
  locked = true;
  answeredCount++;
  const idx = parseInt(el.dataset.idx);
  const opts = document.querySelectorAll('.option');
  opts.forEach(o=>o.classList.add('locked'));
  if(idx === item.correct){
    el.classList.add('correct');
    correctCount++;
  } else {
    el.classList.add('wrong');
    opts[item.correct].classList.add('correct');
    wrongTopics[item.topic] = (wrongTopics[item.topic]||0)+1;
  }
  const exp = document.getElementById('explainBox');
  exp.innerHTML = `<b>Erklärung:</b> ${item.explain}`;
  exp.classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
  renderStats();
}

function renderDone(){
  const pct = answeredCount ? Math.round(correctCount/answeredCount*100) : 0;
  let weakHtml = '';
  const entries = Object.entries(wrongTopics).sort((a,b)=>b[1]-a[1]);
  if(entries.length){
    weakHtml = `<div class="weakbox"><b>Schwachstellen (mehr Fehler):</b>` +
      entries.map(([t,c])=>`<div>${t}: ${c} Fehler</div>`).join('') +
      `</div>`;
  }
  document.getElementById('quizArea').innerHTML = `
    <div class="card done-card">
      <div>Quiz abgeschlossen</div>
      <div class="big">${correctCount}/${currentSet.length}</div>
      <div style="color:var(--text-dim)">${pct}% richtig</div>
      ${weakHtml}
      <button class="restart" id="restartBtn">Nochmal (neu gemischt)</button>
    </div>
  `;
  document.getElementById('restartBtn').addEventListener('click', buildSet);
}

topicSelect.addEventListener('change', buildSet);
document.getElementById('shuffleBtn').addEventListener('click', buildSet);
document.getElementById('resetProgressBtn').addEventListener('click', buildSet);

buildSet();
</script>
